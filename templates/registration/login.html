{% extends "layout.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1 class='font-bold text-4xl mb-4 border-b pb-4'>Login Form</h1>

<form method="post">
    {% csrf_token %}
    {{form}}
    <button type = 'submit'
    class = 'bg-gray-800 border border-gray-600 px-4 py-1 rounded mt-2 hover:bg-gray-700 transition'>
        Login
    </button>
</form>
<p>Don't have a account? <a href="{% url 'register' %}">Register Here</a></p>

{% endblock %}
