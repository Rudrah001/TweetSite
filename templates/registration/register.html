{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<h1 class='font-bold text-4xl mb-4 border-b pb-4'>Registration Form</h1>

<form method="post">
    {% csrf_token %}
    {{form}}
    <button type = 'submit'
    class = 'bg-gray-800 border border-gray-600 px-4 py-1 rounded mt-2 hover:bg-gray-700 transition'>
        Submit
    </button>
</form>

{% endblock %}
